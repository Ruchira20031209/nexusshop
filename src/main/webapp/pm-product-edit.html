<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const target = id ? `pm/edit-product?productID=${encodeURIComponent(id)}` : 'pm/dashboard';
  window.location.replace(target);
</script>
</body>
</html>
